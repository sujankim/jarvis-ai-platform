version: 2

updates:

  # ── Maven Dependencies ──────────────────────────
  - package-ecosystem: "maven"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: chore
      include: scope
    groups:
      spring-dependencies:
        patterns:
          - "org.springframework*"
      spring-ai:
        patterns:
          - "org.springframework.ai*"
      testcontainers:
        patterns:
          - "org.testcontainers*"

  # ── GitHub Actions ──────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - dependencies
      - github-actions